<!-- This tells the browser that we are creating a web page -->
<!DOCTYPE html>

<!-- The main HTML container -->
<html lang="en">

<head>
  <!-- This sets the character type so text displays correctly -->
  <meta charset="UTF-8" />

  <!-- This helps the website look good on mobile, tablet, and desktop -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- This is the title shown on the browser tab -->
  <title>Recipe Explorer</title>

  <!-- Link Bootstrap CSS here to get ready-made styles -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Add your custom CSS file or style tag here -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container py-4 app wrapper">
    <h2 class="text-center am-2 fw-bold"> Recipie Explorer</h2>
    <p class = "text-center text-muted hero-subtitle mb-3">
      Search your favourite teacher
    </p>


    <div class ="input-group mb-2">
      <input
        id="searchInput"
        type = "text"
        class = "form-control"
        placeholder = "Tyoe a dish name."
      />
      <button id = "searchBtn" class = "btn btn-primary">Search</button>
    </div>

    <div class = "suggested-terms text-center mb-3">
      <small class = "text-muted d-block mb-1">Try Searching</small>
      <span data-term="cake">cake</span>
      <span data-term="salad">salad</span>
      <span data-term="Rice">Rice</span>
      <span data-term="chocolate">chocolate</span>
      <span data-term="noodles">Noodles</span>
    </div>

    <div id="message" class = "text-center text-muted mb-3"></div>

    <div id="results" class="row g-4 justify-content-center">

    </div>
  </div>

  <div class ="modal fade" id="recipieModal" tabindex="-1" aria-hidden="true">
    <div class ="modal-dialog modal-lg modal-dialog-centered">
      <div class ="modal-content">
        <div class = "modal-header">
          <h5 class ="modal-title" id="recipieModalLabel">Recipie Details</h5>
          <button type ="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
          </button>
        </div>
        <div class ="modal-body" id ="modalBody">

        </div>
      </div>
    </div>
  </div>
      
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="app.js"></script>
</body>

</html>
